<div *ngif="alerts.length" class ="containe">
    <div class="m-3">
        <div *ngFor="let alrt of alerts" class="{{cssClasses(alert)}}">
            <span [innerHTML]="alrt.message">
                <s class="btn-close" (click)="removeAlert(alert)" title="Close alert"></button>
            </span>
        </div>
    </div>
</div>
